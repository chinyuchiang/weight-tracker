<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <title>體重管家</title>
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#00c9a7" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="default" />
  <meta name="apple-mobile-web-app-title" content="體重管家" />
  <link rel="manifest" href="/manifest.json" />
  <link rel="apple-touch-icon" href="/icon.svg" />
  <link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
  <style>
    :root {
      --mint: #00c9a7;
      --mint-light: #e6faf6;
      --mint-dark: #00a387;
      --coral: #ff6b6b;
      --coral-light: #fff0f0;
      --amber: #ffb347;
      --amber-light: #fff8ee;
      --ink: #1a1a2e;
      --ink-soft: #3d3d5c;
      --mist: #f4f6fb;
      --border: #e8ecf4;
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(26,26,46,0.06);
      --shadow-md: 0 8px 32px rgba(26,26,46,0.10);
      --shadow-lg: 0 20px 60px rgba(26,26,46,0.14);
      --radius: 16px;
      --radius-sm: 10px;
      --user-a: #007aff;
      --user-b: #ff3b30;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'DM Sans', -apple-system, sans-serif;
      background: var(--mist);
      color: var(--ink);
      min-height: 100vh;
    }

    /* ── Header ── */
    .site-header {
      background: var(--white);
      border-bottom: 1px solid var(--border);
      padding: 0 24px;
      position: sticky;
      top: 0;
      z-index: 100;
      display: flex;
      align-items: center;
      justify-content: space-between;
      height: 64px;
      box-shadow: var(--shadow-sm);
    }

    .logo {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo-icon {
      width: 36px; height: 36px;
      background: linear-gradient(135deg, var(--mint), #00a1d8);
      border-radius: 10px;
      display: flex; align-items: center; justify-content: center;
      font-size: 18px;
    }

    .user-switch {
      display: flex;
      gap: 8px;
    }

    .user-pill {
      padding: 6px 18px;
      border-radius: 999px;
      border: 2px solid var(--border);
      background: var(--mist);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all 0.2s;
      color: var(--ink-soft);
    }

    .user-pill.active-a { background: var(--user-a); border-color: var(--user-a); color: #fff; }
    .user-pill.active-b { background: var(--user-b); border-color: var(--user-b); color: #fff; }

    /* ── Layout ── */
    .main { max-width: 900px; margin: 0 auto; padding: 28px 20px 60px; }

    /* Welcome banner */
    .welcome-banner {
      background: linear-gradient(135deg, var(--ink) 0%, #16213e 60%, #0f3460 100%);
      border-radius: var(--radius);
      padding: 32px 28px;
      color: #fff;
      margin-bottom: 24px;
      position: relative;
      overflow: hidden;
      animation: fadeSlideDown 0.5s ease both;
    }

    .welcome-banner::after {
      content: '';
      position: absolute;
      right: -40px; top: -40px;
      width: 220px; height: 220px;
      background: radial-gradient(circle, rgba(0,201,167,0.25) 0%, transparent 70%);
      border-radius: 50%;
      pointer-events: none;
    }

    .welcome-banner h2 {
      font-family: 'DM Serif Display', serif;
      font-size: 26px;
      margin-bottom: 6px;
      font-weight: 400;
    }

    .welcome-banner p { font-size: 14px; opacity: 0.65; }

    .stats-row {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 12px;
      margin-top: 20px;
    }

    .stat-chip {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.12);
      border-radius: 12px;
      padding: 12px 14px;
      text-align: center;
    }

    .stat-chip .val {
      font-family: 'DM Serif Display', serif;
      font-size: 22px;
      color: var(--mint);
      display: block;
      line-height: 1;
    }

    .stat-chip .lbl { font-size: 11px; opacity: 0.55; margin-top: 4px; display: block; }

    /* ── Cards ── */
    .card {
      background: var(--white);
      border-radius: var(--radius);
      padding: 24px;
      margin-bottom: 20px;
      box-shadow: var(--shadow-sm);
      border: 1px solid var(--border);
      animation: fadeUp 0.4s ease both;
    }

    .card-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 20px;
    }

    .card-title {
      font-size: 15px;
      font-weight: 600;
      color: var(--ink);
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .card-title .dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      background: var(--mint);
      flex-shrink: 0;
    }

    /* ── Input Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    input[type="date"],
    input[type="number"],
    input[type="text"],
    input[type="tel"] {
      height: 56px;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 0 18px;
      font-size: 18px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--mist);
      transition: border-color 0.2s, box-shadow 0.2s;
      width: 100%;
      box-sizing: border-box;
    }

    input:focus {
      outline: none;
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(0,201,167,0.12);
      background: #fff;
    }

    /* unhealthy toggle */
    .toggle-label {
      display: flex;
      align-items: center;
      gap: 12px;
      background: var(--coral-light);
      border: 1.5px solid #ffd0d0;
      border-radius: var(--radius-sm);
      padding: 0 18px;
      height: 56px;
      cursor: pointer;
      font-size: 16px;
      font-weight: 500;
      color: var(--coral);
      transition: all 0.2s;
      user-select: none;
    }

    .toggle-label input[type="checkbox"] {
      width: 22px; height: 22px;
      accent-color: var(--coral);
      cursor: pointer;
      pointer-events: none;
      flex-shrink: 0;
    }

    .toggle-label.checked {
      background: var(--coral);
      border-color: var(--coral);
      color: #fff;
    }

    /* Note field */
    .note-field {
      grid-column: 1 / -1;
    }

    textarea {
      width: 100%;
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 14px 18px;
      font-size: 17px;
      font-family: 'DM Sans', sans-serif;
      color: var(--ink);
      background: var(--mist);
      resize: none;
      height: 64px;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    textarea:focus {
      outline: none;
      border-color: var(--mint);
      box-shadow: 0 0 0 3px rgba(0,201,167,0.12);
      background: #fff;
    }

    /* Buttons */
    .btn-row {
      grid-column: 1 / -1;
      display: flex;
      gap: 10px;
      margin-top: 4px;
    }

    .btn {
      height: 56px;
      border: none;
      border-radius: var(--radius-sm);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 6px;
    }

    .btn:active { transform: scale(0.98); }

    .btn-primary {
      background: var(--mint);
      color: #fff;
      flex: 1;
      box-shadow: 0 4px 16px rgba(0,201,167,0.3);
    }

    .btn-primary:hover { background: var(--mint-dark); }

    .btn-ghost {
      background: var(--mist);
      color: var(--ink-soft);
      border: 1.5px solid var(--border);
      padding: 0 18px;
    }

    .btn-ghost:hover { background: var(--border); }

    .btn-danger {
      background: var(--coral-light);
      color: var(--coral);
      border: 1.5px solid #ffd0d0;
      padding: 0 18px;
    }

    .btn-danger:hover { background: var(--coral); color: #fff; }

    /* Toast */
    #toast {
      position: fixed;
      bottom: 28px; left: 50%;
      transform: translateX(-50%) translateY(80px);
      background: var(--ink);
      color: #fff;
      padding: 12px 24px;
      border-radius: 999px;
      font-size: 14px;
      font-weight: 500;
      box-shadow: var(--shadow-lg);
      z-index: 999;
      transition: transform 0.3s cubic-bezier(0.34,1.56,0.64,1);
      white-space: nowrap;
    }

    #toast.show { transform: translateX(-50%) translateY(0); }

    /* ── Goal & BMI section ── */
    .goal-bmi-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
    }

    .metric-card {
      background: var(--mist);
      border-radius: var(--radius-sm);
      padding: 16px;
      border: 1.5px solid var(--border);
    }

    .metric-card .metric-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      margin-bottom: 6px;
    }

    .metric-card .metric-value {
      font-family: 'DM Serif Display', serif;
      font-size: 28px;
      color: var(--ink);
      line-height: 1;
    }

    .metric-card .metric-sub {
      font-size: 12px;
      color: var(--ink-soft);
      margin-top: 4px;
    }

    .bmi-bar {
      height: 6px;
      border-radius: 3px;
      background: linear-gradient(to right, #60d0ff 0%, #4cd964 30%, #ffcc00 65%, #ff6b6b 85%);
      margin-top: 8px;
      position: relative;
    }

    .bmi-pointer {
      position: absolute;
      top: -5px;
      width: 16px; height: 16px;
      background: var(--white);
      border: 2.5px solid var(--ink);
      border-radius: 50%;
      transform: translateX(-50%);
      transition: left 0.5s ease;
    }

    /* ── Chart ── */
    .chart-controls {
      display: flex;
      gap: 6px;
    }

    .range-btn {
      padding: 5px 12px;
      font-size: 12px;
      font-weight: 600;
      border: 1.5px solid var(--border);
      border-radius: 999px;
      background: var(--mist);
      cursor: pointer;
      color: var(--ink-soft);
      transition: all 0.2s;
    }

    .range-btn.active {
      background: var(--mint);
      border-color: var(--mint);
      color: #fff;
    }

    .chart-wrapper { height: 320px; }

    /* ── Calendar ── */
    .cal-nav {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .cal-nav-btn {
      width: 32px; height: 32px;
      border-radius: 50%;
      border: 1.5px solid var(--border);
      background: var(--mist);
      cursor: pointer;
      display: flex; align-items: center; justify-content: center;
      font-size: 16px;
      color: var(--ink-soft);
      transition: all 0.2s;
    }

    .cal-nav-btn:hover { background: var(--mint); color: #fff; border-color: var(--mint); }

    .cal-title { font-weight: 600; font-size: 15px; }

    .cal-table {
      width: 100%;
      border-collapse: collapse;
      table-layout: fixed;
    }

    .cal-table th {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      padding: 8px 0;
      text-align: center;
    }

    .cal-table td {
      border: 1px solid var(--border);
      vertical-align: top;
      text-align: center;
      padding: 4px;
      cursor: pointer;
      transition: background 0.15s;
      height: 72px;
      position: relative;
    }

    .cal-table td:hover { background: var(--mint-light); }

    .cal-table td.today { background: #fff8e6; }

    .cal-day-num {
      font-size: 11px;
      font-weight: 600;
      color: var(--ink-soft);
      display: block;
      text-align: left;
      margin-bottom: 2px;
    }

    .cal-weight {
      display: block;
      font-size: 14px;
      font-weight: 600;
      color: var(--mint-dark);
      line-height: 1.2;
    }

    .cal-note {
      display: block;
      font-size: 9px;
      color: var(--ink-soft);
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
    }

    .cal-unhealthy {
      position: absolute;
      bottom: 3px; right: 4px;
      font-size: 13px;
    }

    .cal-dot {
      width: 6px; height: 6px;
      border-radius: 50%;
      background: var(--mint);
      display: inline-block;
      position: absolute;
      bottom: 4px; left: 50%;
      transform: translateX(-50%);
    }

    /* ── History ── */
    .history-list { display: flex; flex-direction: column; gap: 8px; }

    .history-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 12px 16px;
      background: var(--mist);
      border-radius: var(--radius-sm);
      border: 1px solid var(--border);
      transition: background 0.15s;
    }

    .history-item:hover { background: var(--mint-light); border-color: rgba(0,201,167,0.2); }

    .history-date {
      font-size: 13px;
      color: var(--ink-soft);
      flex-shrink: 0;
      width: 90px;
    }

    .history-weight {
      font-family: 'DM Serif Display', serif;
      font-size: 20px;
      flex: 1;
    }

    .history-diff {
      font-size: 13px;
      font-weight: 600;
      padding: 2px 10px;
      border-radius: 999px;
    }

    .diff-up { color: var(--coral); background: var(--coral-light); }
    .diff-down { color: var(--mint-dark); background: var(--mint-light); }
    .diff-same { color: var(--ink-soft); background: var(--mist); }

    .history-note {
      font-size: 12px;
      color: var(--ink-soft);
      flex: 1;
      text-align: right;
      overflow: hidden;
      text-overflow: ellipsis;
      white-space: nowrap;
      max-width: 120px;
    }

    .history-del {
      background: none;
      border: none;
      cursor: pointer;
      color: #ccc;
      font-size: 16px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.15s;
      flex-shrink: 0;
    }

    .history-del:hover { color: var(--coral); }

    .history-empty {
      text-align: center;
      padding: 40px;
      color: var(--ink-soft);
      font-size: 14px;
    }

    /* ── Animations ── */
    @keyframes fadeSlideDown {
      from { opacity: 0; transform: translateY(-16px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(12px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .card:nth-child(2) { animation-delay: 0.05s; }
    .card:nth-child(3) { animation-delay: 0.10s; }
    .card:nth-child(4) { animation-delay: 0.15s; }
    .card:nth-child(5) { animation-delay: 0.20s; }

    /* Export */
    .export-bar {
      display: flex;
      justify-content: flex-end;
      gap: 8px;
      margin-bottom: 12px;
    }

    /* ── Tab icon/label ── */
    .tab-btn { display: flex; align-items: center; justify-content: center; gap: 6px; }
    .tab-icon { font-size: 16px; line-height: 1; }

    /* Responsive */
    @media (max-width: 600px) {
      .stats-row { grid-template-columns: repeat(2, 1fr); }
      .form-grid { grid-template-columns: 1fr; }
      .goal-bmi-grid { grid-template-columns: 1fr; }
      .chart-wrapper { height: 240px; }
      .cal-table td { height: 52px; }
      .cal-table th { font-size: 9px; padding: 6px 0; }
      .history-note { display: none; }
      .site-header { padding: 0 14px; }
      /* Main content: bottom padding for fixed tab bar + safe area */
      .main { padding: 16px 12px calc(72px + env(safe-area-inset-bottom)); }
      /* Welcome banner compact */
      .welcome-banner { padding: 20px 18px; margin-bottom: 14px; }
      .welcome-banner h2 { font-size: 20px; margin-bottom: 4px; }
      .stats-row { margin-top: 14px; gap: 8px; }
      .stat-chip { padding: 10px 8px; }
      .stat-chip .val { font-size: 18px; }
      /* Card compact */
      .card { padding: 18px 16px; }
      /* 防止 grid/flex 子元素撐破容器 */
      .form-grid, .field { min-width: 0; }
      input[type="date"] { font-size: 16px; max-width: 100%; }
      /* Checkin date row: hide label, tighten gap */
      .checkin-date-row { gap: 6px; }
      .checkin-date-row > label { display: none; }
      /* Fixed bottom tab bar */
      .tab-nav {
        position: fixed;
        bottom: 0; left: 0; right: 0;
        border-radius: 0;
        background-color: #ffffff;
        border: none;
        border-top: 1px solid #e8ecf4;
        padding-top: 6px;
        padding-left: 8px;
        padding-right: 8px;
        padding-bottom: calc(6px + env(safe-area-inset-bottom, 0px));
        margin-bottom: 0;
        z-index: 1000;
        gap: 4px;
        box-shadow: none;
      }
      /* 確保 safe-area 以下也是白色 */
      .tab-nav::after {
        content: '';
        position: absolute;
        left: 0; right: 0;
        bottom: calc(-1 * env(safe-area-inset-bottom, 0px));
        height: env(safe-area-inset-bottom, 0px);
        background-color: #ffffff;
      }
      .tab-btn {
        height: auto;
        padding: 8px 4px;
        flex-direction: column;
        gap: 2px;
        border-radius: 10px;
        font-size: 10px;
        -webkit-tap-highlight-color: transparent;
      }
      .tab-icon { font-size: 22px; }
      /* Prevent items from having blue flash on tap */
      .checkin-item, .history-item, .cal-table td { -webkit-tap-highlight-color: transparent; }
    }

    /* No-user state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--ink-soft);
    }

    .empty-state .emoji { font-size: 48px; display: block; margin-bottom: 12px; }
    .empty-state p { font-size: 15px; }

    /* ── Daily Checkin ── */
    .checkin-date-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 16px;
    }
    .checkin-date-row > label {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      white-space: nowrap;
    }
    .checkin-date-row input[type="date"] {
      height: 44px;
      font-size: 15px;
      max-width: 200px;
    }
    .checkin-progress {
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin-bottom: 16px;
      overflow: hidden;
    }
    .checkin-progress-bar {
      height: 100%;
      background: var(--mint);
      border-radius: 2px;
      transition: width 0.35s ease;
    }
    .checkin-section-label {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      color: var(--ink-soft);
      margin-bottom: 10px;
      margin-top: 4px;
    }
    .checkin-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
      gap: 10px;
      margin-bottom: 16px;
    }
    .checkin-item {
      display: flex;
      align-items: center;
      gap: 10px;
      background: var(--mist);
      border: 1.5px solid var(--border);
      border-radius: var(--radius-sm);
      padding: 12px 14px;
      cursor: pointer;
      transition: all 0.18s;
      user-select: none;
    }
    .checkin-item:hover { border-color: var(--mint); background: var(--mint-light); }
    .checkin-item.checked { background: var(--mint-light); border-color: var(--mint); }
    .checkin-item input[type="checkbox"] {
      width: 18px; height: 18px;
      accent-color: var(--mint);
      flex-shrink: 0;
      pointer-events: none;
    }
    .checkin-icon { font-size: 20px; line-height: 1; }
    .checkin-label { font-size: 14px; font-weight: 500; color: var(--ink); flex: 1; }
    .checkin-del {
      background: none; border: none; cursor: pointer;
      color: #ccc; font-size: 14px; padding: 0 2px;
      transition: color 0.15s;
    }
    .checkin-del:hover { color: var(--coral); }
    .checkin-add-row {
      display: flex;
      gap: 8px;
      margin-top: 4px;
    }
    .checkin-other-divider {
      border: none;
      border-top: 1.5px solid var(--border);
      margin: 20px 0 16px;
    }
    .checkin-other-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 10px;
    }
    .checkin-other-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--ink-soft);
    }
    .checkin-other-pct {
      font-size: 12px;
      color: var(--ink-soft);
      background: var(--mist);
      border: 1px solid var(--border);
      border-radius: 999px;
      padding: 2px 10px;
    }
    .checkin-item.readonly {
      opacity: 0.7;
      cursor: default;
      pointer-events: none;
    }

<!-- ── Header ── -->
<header class="site-header">

<div class="main" id="mainContent">

    <p>請先在右上角選擇使用者</p>
  </div>
</div>

<div id="toast"></div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-app.js";
import { getFirestore, collection, doc, getDocs, getDoc, setDoc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.12.4/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDy-2jhEPiABIL8OUWgHZvBOXb5Ppilmm0",
  authDomain: "weightcontrol-23320.firebaseapp.com",
  projectId: "weightcontrol-23320",
  storageBucket: "weightcontrol-23320.firebasestorage.app",
  messagingSenderId: "190404335338",
  appId: "1:190404335338:web:c7348882173d0fc536e993"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);

const STORAGE_KEY = 'weightTrackerData_v2';
const USERS = ['ChinYu', 'Chen'];
const USER_HEIGHTS = { ChinYu: 0, Chen: 0 }; // 公分，可由 localStorage 存

let data = {};
let currentUser = null;
let chart = null;
let calYear, calMonth;
let chartRange = 90; // days
let goalWeight = {};
let checkinsData = {};
let customHabits = {};
let checkinDate = '';
let checkinChart = null;
let checkinChartRange = 30;
let historyPage = 0;
let activeTab = 'register';

// ── Utilities ──
function today() {
  const d = new Date();
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function toast(msg, duration = 2500) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), duration);
}

// ── Data ──
async function loadData() {
  data = {};
  USERS.forEach(n => { data[n] = []; });
  try {
    for (const name of USERS) {
      const snap = await getDocs(collection(db, 'users', name, 'entries'));
      const list = [];
      snap.forEach(ds => {
        const d = ds.data();
        if (d && d.date && typeof d.weight === 'number')
          list.push({ date: d.date, weight: d.weight, unhealthy: !!d.unhealthy, note: d.note || '' });
      });
      list.sort((a,b) => a.date.localeCompare(b.date));
      data[name] = list;
    }
    localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  } catch {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (raw) data = JSON.parse(raw);
    USERS.forEach(n => { if (!data[n]) data[n] = []; });
  }

  // Load checkins: localStorage first (instant), then Firebase overwrite
  loadCheckinsLocal();
  try {
    for (const name of USERS) {
      const cSnap = await getDocs(collection(db, 'users', name, 'checkins'));
      if (!checkinsData[name]) checkinsData[name] = {};
      cSnap.forEach(ds => { checkinsData[name][ds.id] = ds.data(); });
    }
    saveCheckinsLocal();
  } catch {}

  // Load all custom habits (localStorage first, then Firebase overwrite)
  USERS.forEach(n => {
    const raw = localStorage.getItem(`customHabits_${n}`);
    customHabits[n] = raw ? JSON.parse(raw) : [];
  });
  try {
    for (const name of USERS) {
      const snap = await getDoc(doc(db, 'users', name, 'customHabits', 'config'));
      if (snap.exists()) {
        customHabits[name] = snap.data().items || [];
        localStorage.setItem(`customHabits_${name}`, JSON.stringify(customHabits[name]));
      }
    }
  } catch {}

  // Load goals/heights
  USERS.forEach(n => {
    goalWeight[n] = parseFloat(localStorage.getItem(`goal_${n}`) || 0);
    USER_HEIGHTS[n] = parseFloat(localStorage.getItem(`height_${n}`) || 0);
  });
}

async function saveEntry(entry) {
  const ref = doc(db, 'users', currentUser, 'entries', entry.date);
  await setDoc(ref, entry, { merge: true });
}

async function deleteEntry(date) {
  if (!confirm(`確定要刪除 ${date} 的紀錄嗎？`)) return;
  const ref = doc(db, 'users', currentUser, 'entries', date);
  try { await deleteDoc(ref); } catch {}
  data[currentUser] = data[currentUser].filter(e => e.date !== date);
  localStorage.setItem(STORAGE_KEY, JSON.stringify(data));
  render();
  toast('🗑️ 已刪除紀錄');
}

// ── Checkin ──
async function loadCheckinsForDate(date, user = currentUser) {
  if (checkinsData[user] && checkinsData[user][date] !== undefined) {
    return checkinsData[user][date];
  }
  const ref = doc(db, 'users', user, 'checkins', date);
  try {
    const snap = await getDoc(ref);
    if (!checkinsData[user]) checkinsData[user] = {};
    checkinsData[user][date] = snap.exists()
      ? snap.data()
      : { breakfast: false, lunch: false, dinner: false, exercise: false, sleep: false, custom: {} };
  } catch {
    if (!checkinsData[user]) checkinsData[user] = {};
    checkinsData[user][date] = { breakfast: false, lunch: false, dinner: false, exercise: false, sleep: false, custom: {} };
  }
  return checkinsData[user][date];
}

const CHECKIN_KEY = 'checkinData_v1';

function saveCheckinsLocal() {
  try { localStorage.setItem(CHECKIN_KEY, JSON.stringify(checkinsData)); } catch {}
}

function loadCheckinsLocal() {
  try {
    const raw = localStorage.getItem(CHECKIN_KEY);
    if (!raw) return;
    const parsed = JSON.parse(raw);
    Object.keys(parsed).forEach(name => {
      if (!checkinsData[name]) checkinsData[name] = {};
      Object.assign(checkinsData[name], parsed[name]);
    });
  } catch {}
}

async function saveCheckinToFirestore(date) {
  saveCheckinsLocal();
  const ref = doc(db, 'users', currentUser, 'checkins', date);
  try { await setDoc(ref, checkinsData[currentUser][date]); } catch {}
}

function renderCheckinChart() {
  const canvas = document.getElementById('checkinChartCanvas');
  if (!canvas) return;
  if (checkinChart) { checkinChart.destroy(); checkinChart = null; }

  const fixedKeys = ['breakfast','lunch','dinner','exercise','sleep'];
  const colors = { ChinYu: '#007aff', Chen: '#ff3b30' };

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - checkinChartRange + 1);
  const cutoffStr = cutoff.toISOString().split('T')[0];


  const activeUsers = USERS.filter(name => {
    const userData = checkinsData[name] || {};
    return Object.values(userData).some(h =>
      fixedKeys.some(k => h[k]) || Object.values(h.custom || {}).some(v => v)
    );
  });
  if (!activeUsers.length) {
    canvas.parentElement.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-soft);font-size:14px">📭 尚無打卡紀錄</div>';
    return;
  }

  const allDatesSet = new Set();
  activeUsers.forEach(name => {
    Object.keys(checkinsData[name] || {}).forEach(d => {
      if (checkinChartRange === 9999 || d >= cutoffStr) allDatesSet.add(d);
    });
  });
  const dates = Array.from(allDatesSet).sort();

  if (!dates.length) {
    canvas.parentElement.innerHTML = '<div style="text-align:center;padding:40px;color:var(--ink-soft);font-size:14px">📭 尚無打卡紀錄</div>';
    return;
  }

  const datasets = activeUsers.map(name => {
    const c = colors[name];
    const customs = customHabits[name] || [];
    const totalItems = fixedKeys.length + customs.length;
    const userData = checkinsData[name] || {};
    const pctData = dates.map(d => {
      const h = userData[d];
      if (!h || totalItems === 0) return null;
      const done = fixedKeys.filter(k => h[k]).length
        + customs.filter(c => h.custom && h.custom[c]).length;
      return Math.round(done / totalItems * 100);
    });
    const validPcts = pctData.filter(v => v !== null);
    const avg = validPcts.length ? Math.round(validPcts.reduce((a,b) => a+b, 0) / validPcts.length) : 0;
    return [
      {
        label: name,
        data: pctData,
        borderColor: c,
        backgroundColor: c + '12',
        tension: 0.35,
        spanGaps: true,
        fill: false,
        pointRadius: 3,
        pointHoverRadius: 6,
      },
      {
        label: `${name} 平均 ${avg}%`,
        data: dates.map(() => avg),
        borderColor: c + '55',
        borderDash: [6, 4],
        pointRadius: 0,
        tension: 0,
        spanGaps: true,
        fill: false,
      }
    ];
  }).flat();

  checkinChart = new Chart(canvas, {
    type: 'line',
    data: { labels: dates, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => ctx.parsed.y !== null ? `${ctx.dataset.label.split(' ')[0]}: ${ctx.parsed.y}%` : null
          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: { size: 11 } }, grid: { color: '#f0f0f0' } },
        y: {
          min: 0, max: 100,
          ticks: { font: { size: 11 }, callback: v => v + '%' },
          grid: { color: '#f0f0f0' }
        }
      }
    }
  });
}

function getCheckinPct(date) {
  const habits = checkinsData[currentUser] && checkinsData[currentUser][date];
  if (!habits) return -1;
  const customs = customHabits[currentUser] || [];
  const fixedKeys = ['breakfast','lunch','dinner','exercise','sleep'];
  const total = fixedKeys.length + customs.length;
  if (total === 0) return -1;
  const checked = fixedKeys.filter(k => habits[k]).length
    + customs.filter(c => habits.custom && habits.custom[c]).length;
  return Math.round(checked / total * 100);
}

function loadCustomHabitsForUser() {
  const raw = localStorage.getItem(`customHabits_${currentUser}`);
  customHabits[currentUser] = raw ? JSON.parse(raw) : [];
}

function getCheckinStreak() {
  let streak = 0;
  const d = new Date();
  while (true) {
    const ds = `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
    if (getCheckinPct(ds) < 100) break;
    streak++;
    d.setDate(d.getDate() - 1);
  }
  return streak;
}

async function saveCustomHabitsForUser() {
  const items = customHabits[currentUser] || [];
  localStorage.setItem(`customHabits_${currentUser}`, JSON.stringify(items));
  try { await setDoc(doc(db, 'users', currentUser, 'customHabits', 'config'), { items }); } catch {}
}

async function renderCheckinCard() {
  const container = document.getElementById('checkinGrid');
  if (!container) return;

  const habits = await loadCheckinsForDate(checkinDate);
  const customs = customHabits[currentUser] || [];

  const fixedItems = [
    { key: 'breakfast', icon: '🌅', label: '早餐' },
    { key: 'lunch',    icon: '🍱',  label: '午餐' },
    { key: 'dinner',   icon: '🌙',  label: '晚餐' },
    { key: 'exercise', icon: '💪',  label: '運動' },
    { key: 'sleep',    icon: '😴',  label: '睡眠' },
  ];

  const totalItems = fixedItems.length + customs.length;
  const checked = fixedItems.filter(f => habits[f.key]).length
    + customs.filter(c => habits.custom && habits.custom[c]).length;
  const pct = totalItems > 0 ? Math.round(checked / totalItems * 100) : 0;

  const progBar = document.getElementById('checkinProgress');
  const progLabel = document.getElementById('checkinProgressLabel');
  if (progBar) {
    progBar.style.width = pct + '%';
    progBar.style.background = pct === 100 ? '#34c759' : 'var(--mint)';
  }
  if (progLabel) progLabel.textContent = `${checked} / ${totalItems} 完成（${pct}%）`;

  const streakBadge = document.getElementById('checkinStreakBadge');
  if (streakBadge) {
    const streak = getCheckinStreak();
    streakBadge.textContent = streak >= 2 ? `🔥 連續 ${streak} 天` : streak === 1 ? '🌱 連續 1 天' : '';
  }

  const dateLabel = document.getElementById('checkinDateLabel');
  if (dateLabel) {
    const t = today();
    const yd = new Date(); yd.setDate(yd.getDate() - 1);
    const yesterday = `${yd.getFullYear()}-${String(yd.getMonth()+1).padStart(2,'0')}-${String(yd.getDate()).padStart(2,'0')}`;
    dateLabel.textContent = checkinDate === t ? '今天' : checkinDate === yesterday ? '昨天' : '';
  }

  container.innerHTML = fixedItems.map(f => `
    <div class="checkin-item ${habits[f.key] ? 'checked' : ''}" onclick="window._toggleCheckin('${f.key}',null)">
      <input type="checkbox" ${habits[f.key] ? 'checked' : ''} readonly />
      <span class="checkin-icon">${f.icon}</span>
      <span class="checkin-label">${f.label}</span>
    </div>
  `).join('');

  const customContainer = document.getElementById('customHabitList');
  if (customContainer) {
    if (customs.length === 0) {
      customContainer.innerHTML = '<div style="color:var(--ink-soft);font-size:13px;padding:4px 0 8px">尚無自訂項目，在下方輸入新增</div>';
    } else {
      customContainer.innerHTML = `<div class="checkin-grid" style="margin-bottom:8px">${
        customs.map(c => {
          const enc = encodeURIComponent(c);
          const isChecked = !!(habits.custom && habits.custom[c]);
          return `<div class="checkin-item ${isChecked ? 'checked' : ''}" onclick="window._toggleCheckin(null,'${enc}')">
            <input type="checkbox" ${isChecked ? 'checked' : ''} readonly />
            <span class="checkin-icon">⭐</span>
            <span class="checkin-label">${c}</span>
            <button class="checkin-del" onclick="event.stopPropagation();window._deleteCustomHabit('${enc}')" title="刪除">✕</button>
          </div>`;
        }).join('')
      }</div>`;
    }
  }

  // 對方的打卡狀態（唯讀）
  const otherSection = document.getElementById('otherCheckinSection');
  if (otherSection) {
    const otherUser = USERS.find(u => u !== currentUser);
    const otherHabits = await loadCheckinsForDate(checkinDate, otherUser);
    const otherCustoms = customHabits[otherUser] || [];
    const otherColor = otherUser === 'ChinYu' ? 'var(--user-a)' : 'var(--user-b)';
    const otherTotal = fixedItems.length + otherCustoms.length;
    const otherDone = fixedItems.filter(f => otherHabits[f.key]).length
      + otherCustoms.filter(c => otherHabits.custom && otherHabits.custom[c]).length;
    const otherPct = otherTotal > 0 ? Math.round(otherDone / otherTotal * 100) : 0;

    const allItems = [
      ...fixedItems.map(f => ({ icon: f.icon, label: f.label, checked: !!otherHabits[f.key] })),
      ...otherCustoms.map(c => ({ icon: '⭐', label: c, checked: !!(otherHabits.custom && otherHabits.custom[c]) })),
    ];

    otherSection.innerHTML = `
      <hr class="checkin-other-divider" />
      <div class="checkin-other-header">
        <span class="checkin-other-title" style="color:${otherColor}">👤 ${otherUser} 的打卡（${checkinDate}）</span>
        <span class="checkin-other-pct">${otherDone} / ${otherTotal} 完成（${otherPct}%）</span>
      </div>
      <div class="checkin-grid">
        ${allItems.map(item => `
          <div class="checkin-item readonly ${item.checked ? 'checked' : ''}">
            <input type="checkbox" ${item.checked ? 'checked' : ''} readonly />
            <span class="checkin-icon">${item.icon}</span>
            <span class="checkin-label">${item.label}</span>
          </div>`).join('')}
      </div>`;
  }

  // Update › button and 今天 button visual state
  const nextBtn = document.getElementById('checkinNextBtn');
  const todayBtnEl = document.getElementById('checkinTodayBtn');
  if (nextBtn) {
    const atToday = checkinDate >= today();
    nextBtn.style.opacity = atToday ? '0.3' : '1';
    nextBtn.style.cursor = atToday ? 'not-allowed' : 'pointer';
    if (todayBtnEl) todayBtnEl.style.display = atToday ? 'none' : '';
  }
}

window._toggleCheckin = async (fixedKey, customKeyEnc) => {
  if (!checkinsData[currentUser]) checkinsData[currentUser] = {};
  if (!checkinsData[currentUser][checkinDate]) {
    checkinsData[currentUser][checkinDate] = { breakfast: false, lunch: false, dinner: false, exercise: false, sleep: false, custom: {} };
  }
  const habits = checkinsData[currentUser][checkinDate];
  if (fixedKey) {
    habits[fixedKey] = !habits[fixedKey];
  } else if (customKeyEnc) {
    const c = decodeURIComponent(customKeyEnc);
    if (!habits.custom) habits.custom = {};
    habits.custom[c] = !habits.custom[c];
  }
  await saveCheckinToFirestore(checkinDate);
  renderCheckinCard();
  const h2 = checkinsData[currentUser][checkinDate];
  const customs2 = customHabits[currentUser] || [];
  const fixedKeys = ['breakfast','lunch','dinner','exercise','sleep'];
  const total2 = fixedKeys.length + customs2.length;
  const done2 = fixedKeys.filter(k => h2[k]).length + customs2.filter(c => h2.custom && h2.custom[c]).length;
  if (total2 > 0 && done2 === total2) {
    toast('🎉 今日打卡全部完成！太棒了！', 3000);
  } else {
    toast('✓ 已儲存', 1200);
  }
};

window._deleteCustomHabit = (enc) => {
  const name = decodeURIComponent(enc);
  const arr = customHabits[currentUser] || [];
  const idx = arr.indexOf(name);
  if (idx >= 0) arr.splice(idx, 1);
  customHabits[currentUser] = arr;
  saveCustomHabitsForUser();
  renderCheckinCard();
  toast(`🗑️ 已刪除「${name}」`);
};

// ── Stats ──
function getUserStats(name) {
  const entries = (data[name] || []).filter(e => e.weight > 0);
  if (!entries.length) return null;
  const weights = entries.map(e => e.weight);
  const last = entries[entries.length - 1];
  const prev = entries.length >= 2 ? entries[entries.length - 2] : null;
  return {
    latest: last.weight,
    latestDate: last.date,
    min: Math.min(...weights),
    max: Math.max(...weights),
    avg: (weights.reduce((a,b)=>a+b,0)/weights.length).toFixed(1),
    diff: prev ? (last.weight - prev.weight).toFixed(1) : null,
    count: entries.length
  };
}

function calcBMI(weight, heightCm) {
  if (!heightCm || heightCm < 100) return null;
  const h = heightCm / 100;
  return (weight / (h * h)).toFixed(1);
}

function bmiCategory(bmi) {
  if (!bmi) return '';
  const b = parseFloat(bmi);
  if (b < 18.5) return '過輕';
  if (b < 24) return '正常 ✓';
  if (b < 27) return '過重';
  return '肥胖';
}

function bmiPercent(bmi) {
  // map bmi 15–35 to 0–100%
  const b = Math.min(35, Math.max(15, parseFloat(bmi) || 22));
  return ((b - 15) / 20 * 100).toFixed(1);
}

// ── Render ──
function render() {
  renderWelcome();
  if (activeTab === 'register') renderCheckinCard();
  else if (activeTab === 'charts') { renderCheckinChart(); renderChart(); }
  else if (activeTab === 'history') { renderCalendar(); renderHistory(); }
}

function renderWelcome() {
  const stats = getUserStats(currentUser);
  const colorClass = currentUser === 'ChinYu' ? 'var(--user-a)' : 'var(--user-b)';
  const height = USER_HEIGHTS[currentUser];
  const bmi = stats ? calcBMI(stats.latest, height) : null;
  const goal = goalWeight[currentUser];

  const diffStr = stats?.diff !== null ? (parseFloat(stats.diff) >= 0 ? `+${stats.diff}` : stats.diff) + ' kg' : '—';
  const goalDiff = (stats && goal) ? (stats.latest - goal).toFixed(1) : null;

  document.getElementById('mainContent').querySelector('.welcome-banner').innerHTML = `
    <h2>👋 ${currentUser} 的健康日記</h2>
    <p>${stats ? `最新紀錄：${stats.latestDate}　共 ${stats.count} 筆資料` : '尚無紀錄，開始記錄你的體重吧！'}</p>
    <div class="stats-row">
      <div class="stat-chip">
        <span class="val">${stats ? stats.latest : '—'}</span>
        <span class="lbl">目前 kg</span>
      </div>
      <div class="stat-chip">
        <span class="val">${diffStr}</span>
        <span class="lbl">與上次差異</span>
      </div>
      <div class="stat-chip">
        <span class="val">${stats ? stats.min : '—'}</span>
        <span class="lbl">最輕 kg</span>
      </div>
      <div class="stat-chip">
        <span class="val">${bmi || '—'}</span>
        <span class="lbl">BMI</span>
      </div>
    </div>
  `;

  // Update BMI card
  const bmiEl = document.getElementById('bmiCard');
  if (bmiEl) {
    bmiEl.querySelector('.metric-value').textContent = bmi || '—';
    const bmiSub = bmiEl.querySelector('.metric-sub');
    bmiSub.textContent = bmi ? bmiCategory(bmi) : '⬆ 請輸入身高以計算';
    bmiSub.style.color = bmi ? '' : 'var(--amber)';
    const ptr = bmiEl.querySelector('.bmi-pointer');
    if (ptr) {
      if (bmi) { ptr.style.display = ''; ptr.style.left = bmiPercent(bmi) + '%'; }
      else { ptr.style.display = 'none'; }
    }
  }

  // Update goal card
  const goalEl = document.getElementById('goalCard');
  const goalSub = goalEl && goalEl.querySelector('.metric-sub');
  if (goalSub) {
    if (stats && goal) {
      const diff = goalDiff !== null ? (parseFloat(goalDiff) > 0 ? `還需減 ${goalDiff} kg` : `已達標！超出 ${Math.abs(goalDiff)} kg`) : '';
      goalSub.textContent = diff;
      goalSub.style.color = '';
    } else {
      goalSub.textContent = '⬆ 請設定目標體重';
      goalSub.style.color = 'var(--amber)';
    }
  }
}

function renderChart() {
  const canvas = document.getElementById('weightChart');
  if (!canvas) return;
  const ctx = canvas.getContext('2d');
  if (chart) { chart.destroy(); chart = null; }

  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - chartRange);
  const cutoffStr = cutoff.toISOString().split('T')[0];

  const keySet = new Set();
  const perUser = {};

  USERS.forEach(name => {
    const groups = {};
    (data[name] || []).filter(e => chartRange === 9999 || e.date >= cutoffStr).forEach(e => {
      if (!groups[e.date]) groups[e.date] = { sum: 0, count: 0, unhealthy: [] };
      if (e.weight > 0) { groups[e.date].sum += e.weight; groups[e.date].count++; }
      if (e.unhealthy && e.weight > 0) groups[e.date].unhealthy.push(e.weight);
      keySet.add(e.date);
    });
    perUser[name] = groups;
  });

  const keys = Array.from(keySet).sort();
  const colors = { ChinYu: '#007aff', Chen: '#ff3b30' };

  const datasets = USERS.flatMap(name => {
    const c = colors[name];
    const lineData = keys.map(k => {
      const g = perUser[name][k];
      return (g && g.count > 0) ? (g.sum / g.count).toFixed(1) : null;
    });
    const isUnhealthy = keys.map(k => !!(perUser[name][k] && perUser[name][k].unhealthy.length > 0));

    const points = [{
      label: name,
      data: lineData,
      borderColor: c,
      backgroundColor: c + '18',
      tension: 0.35,
      spanGaps: true,
      fill: false,
      pointRadius: isUnhealthy.map(u => u ? 7 : 3),
      pointHoverRadius: isUnhealthy.map(u => u ? 9 : 6),
      pointBackgroundColor: isUnhealthy.map(u => u ? '#af52de' : c),
      pointStyle: isUnhealthy.map(u => u ? 'star' : 'circle'),
    }];

    // Goal line
    const goal = goalWeight[name];
    if (goal > 0) {
      points.push({
        label: `${name} 目標`,
        data: keys.map(() => goal),
        borderColor: c + '66',
        borderDash: [6, 4],
        tension: 0,
        pointRadius: 0,
        spanGaps: true,
      });
    }
    return points;
  });

  chart = new Chart(ctx, {
    type: 'line',
    data: { labels: keys, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: true, position: 'top', labels: { boxWidth: 12, font: { size: 12 } } },
        tooltip: {
          callbacks: {
            label: ctx => {
              if (ctx.parsed.y === null) return null;
              const g = perUser[ctx.dataset.label] && perUser[ctx.dataset.label][keys[ctx.dataIndex]];
              const unhealthy = g && g.unhealthy.length > 0;
              return `${ctx.dataset.label}: ${ctx.parsed.y} kg${unhealthy ? ' ☠️' : ''}`;
            }
          }
        }
      },
      scales: {
        x: { ticks: { maxTicksLimit: 8, font: { size: 11 } }, grid: { color: '#f0f0f0' } },
        y: { beginAtZero: false, grace: '5%', ticks: { font: { size: 11 } }, grid: { color: '#f0f0f0' } }
      }
    }
  });
}

function renderCalendar() {
  const container = document.getElementById('calBody');
  if (!container) return;
  const t = new Date();
  if (calYear == null) { calYear = t.getFullYear(); calMonth = t.getMonth(); }
  document.getElementById('calTitle').textContent = `${calYear} 年 ${calMonth + 1} 月`;

  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const todayStr = today();
  const entryMap = {};
  (data[currentUser] || []).forEach(e => { entryMap[e.date] = e; });

  let html = `<table class="cal-table">
    <thead><tr><th>日</th><th>一</th><th>二</th><th>三</th><th>四</th><th>五</th><th>六</th></tr></thead>
    <tbody><tr>`;

  for (let i = 0; i < firstDay; i++) html += '<td></td>';

  for (let day = 1; day <= daysInMonth; day++) {
    if ((firstDay + day - 1) % 7 === 0 && day !== 1) html += '</tr><tr>';
    const ds = `${calYear}-${String(calMonth+1).padStart(2,'0')}-${String(day).padStart(2,'0')}`;
    const e = entryMap[ds];
    const isToday = ds === todayStr;
    const cpct = getCheckinPct(ds);
    const checkinBadge = cpct === 100
      ? '<span style="position:absolute;top:2px;right:3px;font-size:10px">✅</span>'
      : cpct > 0
      ? `<span style="position:absolute;top:4px;right:4px;width:7px;height:7px;border-radius:50%;background:var(--amber);display:inline-block"></span>`
      : '';
    html += `<td class="${isToday ? 'today' : ''}" onclick="window._pickDate('${ds}','${e?e.weight:''}','${e?encodeURIComponent(e.note||''):''}')">
      <span class="cal-day-num">${day}</span>
      ${checkinBadge}
      <span class="cal-weight">${e && e.weight > 0 ? e.weight : ''}</span>
      <span class="cal-note">${e && e.note ? decodeURIComponent(encodeURIComponent(e.note)) : ''}</span>
      ${e && e.unhealthy ? '<span class="cal-unhealthy">☠️</span>' : (e && e.weight ? '<span class="cal-dot"></span>' : '')}
    </td>`;
  }
  html += '</tr></tbody></table>';
  container.innerHTML = html;
}

function renderHistory() {
  const container = document.getElementById('historyList');
  if (!container) return;
  const entries = [...(data[currentUser] || [])].filter(e => e.weight > 0).reverse();
  if (!entries.length) {
    container.innerHTML = '<div class="history-empty">📭 尚無紀錄</div>';
    return;
  }

  const pageSize = 30;
  const visible = entries.slice(0, (historyPage + 1) * pageSize);
  const hasMore = entries.length > visible.length;

  const html = visible.map((e, i) => {
    const prev = entries[i + 1];
    let diffHtml = '';
    if (prev) {
      const diff = (e.weight - prev.weight).toFixed(1);
      const cls = parseFloat(diff) > 0 ? 'diff-up' : parseFloat(diff) < 0 ? 'diff-down' : 'diff-same';
      diffHtml = `<span class="history-diff ${cls}">${parseFloat(diff) >= 0 ? '+' : ''}${diff}</span>`;
    }
    return `<div class="history-item">
      <span class="history-date">${e.date}</span>
      <span class="history-weight">${e.weight} <small style="font-size:13px;font-family:'DM Sans'">kg</small></span>
      ${diffHtml}
      ${e.unhealthy ? '<span title="上次不健康">☠️</span>' : ''}
      <span class="history-note">${e.note || ''}</span>
      <button class="history-del" onclick="window._deleteEntry('${e.date}')" title="刪除">✕</button>
    </div>`;
  }).join('');

  const loadMoreHtml = hasMore
    ? `<div style="text-align:center;padding:16px 0"><button class="btn btn-ghost" style="height:44px;padding:0 24px" id="loadMoreBtn">載入更多（還有 ${entries.length - visible.length} 筆）</button></div>`
    : '';

  container.innerHTML = html + loadMoreHtml;
  if (hasMore) {
    document.getElementById('loadMoreBtn').onclick = () => { historyPage++; renderHistory(); };
  }
}

window._pickDate = (date, weight, noteEnc) => {
  document.getElementById('dateInput').value = date;
  document.getElementById('weightInput').value = weight;
  try { document.getElementById('noteInput').value = decodeURIComponent(noteEnc || ''); } catch {}
  if (date <= today()) {
    checkinDate = date;
    const checkinDateInput = document.getElementById('checkinDateInput');

    // Switch to register tab and scroll to checkin

      document.getElementById('checkinGrid')?.closest('.card')?.scrollIntoView({ behavior: 'smooth', block: 'start' });

  }
  toast(`📅 已選取 ${date}`);
};

    activeTab = tabId;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    document.querySelectorAll('.tab-panel').forEach(p => p.classList.remove('active'));
    document.querySelector(`[data-tab="${tabId}"]`).classList.add('active');
    document.getElementById('tab-' + tabId).classList.add('active');
    if (tabId === 'charts') { renderChart(); renderCheckinChart(); }
    else if (tabId === 'history') { renderCalendar(); renderHistory(); }
    else if (tabId === 'register') renderCheckinCard();
  };
  switchTab(activeTab);
  document.querySelectorAll('.tab-btn').forEach(btn => {
    btn.onclick = () => switchTab(btn.dataset.tab);
  });

  render();
}

function exportCSV() {
  const entries = data[currentUser] || [];
  if (!entries.length) { toast('沒有資料可匯出'); return; }
  const rows = [['日期','體重(kg)','不健康標記','備註']];
  entries.forEach(e => rows.push([e.date, e.weight, e.unhealthy ? '是' : '', e.note || '']));
  const csv = rows.map(r => r.join(',')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8;' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = `${currentUser}_體重紀錄.csv`; a.click();
  URL.revokeObjectURL(url);
  toast('📥 CSV 已下載');
}

function switchUser(name) {
  currentUser = name;
  calYear = null; calMonth = null;
  checkinDate = today();
  historyPage = 0;
  localStorage.setItem('lastUser', name);
  loadCustomHabitsForUser();
  document.querySelectorAll('.user-pill').forEach(p => {
    p.className = 'user-pill';
    if (p.dataset.user === name) p.classList.add(name === 'ChinYu' ? 'active-a' : 'active-b');
  });
  buildUI();
}

// ── Init ──
document.addEventListener('DOMContentLoaded', async () => {
  await loadData();
  document.querySelectorAll('.user-pill').forEach(p => {
    p.onclick = () => switchUser(p.dataset.user);
  });
  const lastUser = localStorage.getItem('lastUser');
  if (lastUser && USERS.includes(lastUser)) switchUser(lastUser);
});

if ('serviceWorker' in navigator) {
  window.addEventListener('load', () => navigator.serviceWorker.register('/sw.js').catch(() => {}));
}
</script>
